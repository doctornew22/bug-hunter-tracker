<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#08090e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="BH Tracker" />
  <title>Bug Hunter Tracker</title>
  <link rel="manifest" href="/manifest.json" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone@7.23.2/babel.min.js"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      height: 100%;
      background: #08090e;
      color: #e2e8f0;
      font-family: 'JetBrains Mono', monospace;
      /* PC তে max width center করা */
      display: flex;
      justify-content: center;
    }

    #root {
      width: 100%;
      max-width: 480px;  /* PC তে phone size এ থাকবে */
      min-height: 100%;
      position: relative;
      background: #08090e;
      /* PC তে shadow দিয়ে phone এর মতো দেখাবে */
      box-shadow: 0 0 60px rgba(0, 212, 232, 0.06);
    }

    /* PC তে background একটু আলাদা দেখাবে */
    @media (min-width: 520px) {
      body {
        background: #04050a;
      }
      #root {
        border-left: 1px solid #1e2330;
        border-right: 1px solid #1e2330;
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 2px; }
    ::-webkit-scrollbar-track { background: #08090e; }
    ::-webkit-scrollbar-thumb { background: #1e2330; border-radius: 2px; }

    /* Loading fallback */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 12px;
      color: #00d4e8;
      font-family: 'JetBrains Mono', monospace;
    }
    #loading .icon { font-size: 32px; }
    #loading .text { font-size: 10px; letter-spacing: 4px; color: #64748b; }
  </style>
</head>
<body>
  <div id="root">
    <!-- Loading state যতক্ষণ JS load হয় -->
    <div id="loading">
      <div class="icon">◉</div>
      <div class="text">LOADING</div>
    </div>
  </div>

  <script type="text/babel" data-presets="react" src="/app.jsx" data-type="module"></script>

  <script>
    // JS load হলে loading div সরিয়ে দাও
    window.addEventListener('load', function() {
      setTimeout(function() {
        const loading = document.getElementById('loading');
        if (loading && document.querySelector('#root > div:not(#loading)')) {
          loading.style.display = 'none';
        }
      }, 500);
    });
  </script>
</body>
</html>
